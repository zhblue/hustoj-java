name: Java CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: jol
          MYSQL_USER: hustoj
          MYSQL_PASSWORD: OostHD0YYXi2UfY2AsmKONCBJnHC6B
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u root -proot --silent && echo "MySQL ready" && break
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Create HUSTOJ tables
        run: |
          mysql -h 127.0.0.1 -u root -proot jol < src/test/resources/schema.sql || true

      - name: Createoj.properties
        run: |
          mkdir -p src/main/resources
          cat > src/main/resources/oj.properties << 'PROPS'
db.host=127.0.0.1
db.name=jol
db.user=root
db.password=root
oj.name=HUSTOJ
oj.lang=cn
PROPS

      - name: Build with Maven
        run: mvn package -DskipTests

      - name: Run tests
        run: mvn test

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: hustoj.war
          path: target/*.war
          retention-days: 7

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7
