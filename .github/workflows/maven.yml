name: Java CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create oj.properties
        run: |
          mkdir -p src/main/resources
          echo 'db.host=localhost' > src/main/resources/oj.properties
          echo 'db.name=jol' >> src/main/resources/oj.properties
          echo 'db.user=root' >> src/main/resources/oj.properties
          echo 'db.password=root' >> src/main/resources/oj.properties
          echo 'oj.name=HUSTOJ' >> src/main/resources/oj.properties
          echo 'oj.lang=cn' >> src/main/resources/oj.properties

      - name: Build
        run: mvn package -DskipTests

      - name: Run unit tests (no DB required)
        run: mvn test -Dtest="SecurityUtilTest,FormatUtilTest,IpUtilTest,SolutionTest,DBTest"

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: hustoj.war
          path: target/*.war
          retention-days: 7
